<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ask Brice</title>

    <meta name="theme-color" content="#000000">

    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Permanent+Marker&family=Rubik+Dirt&family=Caveat:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Sidebar -->

<aside id="sidebar" class="sidebar">

    <div class="sidebar-header">

        <h2>Past Bullshit</h2>

        <button id="newChatBtn">+ Fresh Bullshit</button>

    </div>
<div class="voiceSettings">

    <label for="voiceSelect">
        🗣️ Brice's Voice
    </label>

    <div class="voiceControls">

        <select id="voiceSelect"></select>

        <button
            id="speakerToggle"
            class="speakerToggle"
            type="button"
            title="Toggle voice"
        >
            🔊
        </button>

    </div>

</div>
<div id="historyList"></div>
    <div id="historyList"></div>

</aside>

<!-- Header -->

<header class="header">

    <button id="menuBtn" class="iconButton">
        ☰
    </button>

    <div class="logo">

        <span class="brainEmoji">🧠</span>

        <span>Ask Brice</span>

    </div>

</header>

<!-- Chat -->

<main id="chatWindow" class="chatWindow">

    <section id="welcomeScreen">

        <h1>

            WHAT THE FUCK<br>
            DO YOU WANT?

        </h1>

        <p class="welcomeScript">
            Ask me anything...
        </p>

        <p class="subtitle">
            I'll figure that shit out.
        </p>

    </section>

</main>

<!-- Bottom Bar -->

<footer class="bottomBar">

    <input
    type="file"
    id="fileInput"
    accept="image/*,.pdf,.doc,.docx,.txt,.csv,.xlsx,.json"
        hidden>

    <button
    id="fileBtn"
    class="circleButton"
    title="Upload your bullshit">

    💩

</button>

    <button
        id="micBtn"
        class="circleButton"
        title="Voice">

        🎙️

    </button>

    <textarea
        id="prompt"
        rows="1"
        placeholder="Ask Brice anything..."
        autocomplete="off"
        spellcheck="true"></textarea>

    <button
        id="sendBtn"
        class="circleButton"
        title="Send">

        🧠

    </button>

</footer>

<script src="script.js"></script>

<script>

if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register("./sw.js")
            .catch(console.error);

    });

}

</script>

</body>

</html>
