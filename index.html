<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ask Brice</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Permanent+Marker&family=Rubik+Dirt&family=Caveat:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ==========================
     SIDEBAR
========================== -->

<aside id="sidebar" class="sidebar">

    <div class="sidebar-header">

        <h2>Past Bullshit</h2>

        <button id="newChatBtn">+ Start Bullshittin'</button>

    </div>

    <div id="historyList"></div>

</aside>

<!-- ==========================
     HEADER
========================== -->

<header class="header">

    <button id="menuBtn" class="iconButton">
        ☰
    </button>

    <div class="logo">
        <span class="brainEmoji">🧠</span>
        <span>Ask Brice</span>
    </div>

</header>

<!-- ==========================
     CHAT WINDOW
========================== -->

<main id="chatWindow" class="chatWindow">

    <section id="welcomeScreen">

        <h1>
            WHAT THE FUCK<br>
            DO YOU WANT?
        </h1>

        <p class="welcomeScript">
            Ask me anything…
        </p>

        <p class="subtitle">
            I'll figure that shit out.
        </p>

    </section>

</main>

<!-- ==========================
     INPUT BAR
========================== -->

<footer class="bottomBar">

    <!-- Hidden image picker -->
    <input
        type="file"
        id="imageInput"
        accept="image/*"
        hidden>

    <!-- Image upload -->
    <button
        id="imageBtn"
        class="circleButton"
        title="Upload Photo">

        📷

    </button>

    <!-- Voice -->
    <button
        id="micBtn"
        class="circleButton"
        title="Voice">

        🎙️

    </button>

    <!-- Prompt -->
    <textarea
        id="prompt"
        rows="1"
        placeholder="Ask Brice anything..."
        autocomplete="off"
        spellcheck="true"></textarea>

    <!-- Send -->
    <button
        id="sendBtn"
        class="circleButton"
        title="Send">

        🧠

    </button>

</footer>

<!-- ==========================
     JAVASCRIPT
========================== -->

<script src="script.js"></script>

<script>

if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register("sw.js");

    });

}

</script>

</body>

</html>
