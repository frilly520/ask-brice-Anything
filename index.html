<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ask Brice</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rubik+Dirt&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">

    <div class="sidebar-header">
        <h2>History</h2>
    </div>

    <div id="historyList">
        <p>No conversations yet</p>
    </div>

</div>

<!-- Header -->
<header class="header">

    <button id="menuBtn" class="iconButton">
        ☰
    </button>

    <div class="logo">
        <span class="brainEmoji">🧠</span>
        <span>Ask Brice</span>
    </div>

</header>

<!-- Main Chat -->
<main id="chatWindow" class="chatWindow">

    <div id="welcomeScreen">

        <h1>
            WHAT THE FUCK<br>
            DO YOU WANT?
        </h1>

        <p class="subtitle">
            Ask me anything.<br>
            I'll figure that shit out.
        </p>

    </div>

</main>

<!-- Bottom Bar -->
<footer class="bottomBar">

    <button id="micBtn" class="circleButton">
        🎙️
    </button>

    <textarea
        id="prompt"
        rows="1"
        placeholder="Ask Brice anything..."
    ></textarea>

    <button id="sendBtn" class="circleButton">
        🧠
    </button>

</footer>

<script src="script.js"></script>

</body>
</html>
